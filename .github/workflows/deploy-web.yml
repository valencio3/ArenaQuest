name: Deploy Web

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Build — shared by both environments
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (web + dependencies)
        run: pnpm turbo build --filter=web...

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Deploy Staging — runs on both develop and main
  # ────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: apps/web/.next

      - name: Deploy to Cloudflare Pages (Staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: >
            pages deploy apps/web/.next
            --project-name=arenaquest-web-staging

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Deploy Production — runs only on main, requires manual approval
  #    Configure "Required reviewers" in GitHub → Settings → Environments → production
  # ────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: apps/web/.next

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: >
            pages deploy apps/web/.next
            --project-name=arenaquest-web
